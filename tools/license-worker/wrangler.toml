name = "smartcutpro-license"
main = "src/index.js"
compatibility_date = "2025-12-01"

# KV namespace for storing licenses. Run:
#   wrangler kv:namespace create LICENSES
# then paste the returned id here.
[[kv_namespaces]]
binding = "LICENSES"
id = "REPLACE_WITH_KV_ID"

# R2 bucket for hosting signed .zxp downloads. Run:
#   wrangler r2 bucket create smartcutpro-releases
# then upload your .zxp files with:
#   wrangler r2 object put smartcutpro-releases/SmartCutPro-1.0.0.zxp --file ./dist/...
[[r2_buckets]]
binding = "RELEASES"
bucket_name = "smartcutpro-releases"

# Secrets — set via `wrangler secret put <NAME>`:
#   PADDLE_WEBHOOK_SECRET   (Paddle notification signing secret)
#   PADDLE_API_KEY          (Paddle API key, server-side)
#   DOWNLOAD_SIGNING_KEY    (any random 32+ char string, used to sign URLs)
#   ADMIN_TOKEN             (Bearer token for POSTing new release versions)

[vars]
ACTIVATIONS_MAX      = "3"
DOWNLOAD_URL_TTL_SEC = "600"    # 10 minutes
# Current distributable version. Bump this each release + re-upload the .zxp
# to R2 before setting. Client's `GET /latest-version` reads this.
LATEST_VERSION       = "1.0.0"
LATEST_NOTES         = "Initial release."
LATEST_RELEASED_AT   = "2026-04-18T00:00:00Z"
